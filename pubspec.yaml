name: apnt
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  font_awesome_flutter: ^10.12.0
  firebase_core: ^3.6.0
  firebase_storage: ^12.3.2
  cloud_firestore: ^5.4.4
  image_cropper: ^11.0.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  provider: ^6.1.5+1
  path: ^1.9.1
  pdfx: ^2.7.0
  http: ^1.2.0
  http_parser: ^4.0.2
  intl: ^0.19.0
  image: ^4.0.17
  cloudinary: ^1.1.0
  uuid: ^4.5.1
  shared_preferences: ^2.5.4
  crypto: ^3.0.3
  camera: 0.11.0+2
  google_fonts: ^8.0.1
  path_provider: ^2.1.5
  flutter_animate: ^4.5.2
  razorpay_flutter: ^1.4.1
  js: ^0.7.2
  url_launcher: ^6.3.2
  workmanager: ^0.9.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^12.0.1
  flutter_timezone: ^5.0.1
  rxdart: ^0.28.0
  mobile_scanner: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image.png"
  web:
    generate: true
    image_path: "assets/image.png"
    background_color: "#ffffff"
    theme_color: "#1CCF87"

flutter:
  uses-material-design: true
  assets:
    - assets/

