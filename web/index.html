<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Precision printing, perfectly handled">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ThinkInk">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>ThinkInk</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    window.openRazorpayWebCheckout = function (options, successCallback, errorCallback) {
      var rzpOptions = JSON.parse(options);

      rzpOptions.handler = function (response) {
        successCallback(response.razorpay_payment_id, response.razorpay_order_id, response.razorpay_signature);
      };

      rzpOptions.modal = {
        ondismiss: function () {
          errorCallback("Payment Cancelled");
        },
        escape: true,
        backdropclose: false
      };

      rzpOptions.retry = { enabled: false };
      rzpOptions.timeout = 300;

      var rzp = new Razorpay(rzpOptions);

      rzp.on('payment.failed', function (response) {
        // Only trigger error if not a deliberate cancel
        if (response.error.code !== "USER_CANCELLED") {
          errorCallback(response.error.description || "Payment Failed");
        }
      });

      rzp.open();
    }
  </script>
</head>

<body>
  <script src='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs' type='module'></script>
  <script type='module'>
    var { pdfjsLib } = globalThis;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.mjs';

    var pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/cmaps/',
      cMapPacked: true,
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
